# Dos servers en el mismo host:port.
# Aunque no implementéis virtual hosts, el parser DEBE aceptarlo
# y a la hora de bindear sockets, el listen socket es UNO solo.
server {
    listen      0.0.0.0:8080;
    server_name site_a.local;

    location / {
        root    ./www/html;
        methods GET;
        index   index.html;
    }
}

server {
    listen      0.0.0.0:8080;
    server_name site_b.local;

    location / {
        root    ./www/admin;
        methods GET;
        index   dashboard.html;
    }
}
