# Variantes válidas de listen
server {
    listen 8080;                # sin host -> 0.0.0.0:8080

    location / {
        root    ./www/html;
        methods GET;
        index   index.html;
    }
}

server {
    listen localhost:8081;       # localhost -> 127.0.0.1

    location / {
        root    ./www/html;
        methods GET;
        index   index.html;
    }
}

server {
    listen 127.0.0.1:8082;       # IP explícita

    location / {
        root    ./www/html;
        methods GET;
        index   index.html;
    }
}
